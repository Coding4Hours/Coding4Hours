name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1/3 * *"
  push:
    paths-ignore:
      - "**.md"
    branches:
      - main

jobs:
  # Job 1: Generate Metrics
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: header, repositories
          plugin_lines: yes
          filename: metrics.svg # Explicitly naming it
      
      - name: Upload Metrics Artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-svg
          path: github-metrics.svg

  # Job 2: Generate Stats Card
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&show_owner=true&theme=rose_pine&include_all_commits=true
          path: stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Stats Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stats-svg
          path: stats.svg

  # Job 3: Collect everything and push
  deploy:
    runs-on: ubuntu-latest
    needs: [metrics, stats] # Only runs after the first two finish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Metrics
        uses: actions/download-artifact@v4
        with:
          name: metrics-svg

      - name: Download Stats
        uses: actions/download-artifact@v4
        with:
          name: stats-svg

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add github-metrics.svg stats.svg
          git commit -m "Update README cards" || exit 0
          git push
