name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1/3 * *"
  push:
    paths-ignore:
      - "**.md"
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, repositories
          plugin_lines: yes
